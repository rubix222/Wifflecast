<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WiffleCast</title>
<style>
  /* ---------- Reset & base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
                 Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    background: #f4f6f8;
    color: #1f2937;
    min-height: 100vh;
    line-height: 1.5;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, button, textarea { font-size: 14px; }

  /* ---------- Layout ---------- */
  header {
    background: linear-gradient(135deg, #14532d 0%, #166534 100%);
    color: #fff;
    padding: 16px 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 .logo {
    background: #facc15;
    color: #14532d;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
  }
  .storage-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .storage-status {
    padding: 4px 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    font-size: 12px;
  }
  .storage-status.connected { background: rgba(250, 204, 21, 0.25); color: #fef9c3; }

  nav.tabs {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    padding: 0 16px;
    overflow-x: auto;
  }
  nav.tabs button {
    background: none;
    border: none;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 500;
    color: #6b7280;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  nav.tabs button:hover { color: #166534; }
  nav.tabs button.active {
    color: #166534;
    border-bottom-color: #166534;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }
  .view { display: none; }
  .view.active { display: block; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .toolbar h2 { margin: 0; font-size: 20px; font-weight: 600; }

  /* ---------- Buttons ---------- */
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    background: #fff;
    color: #374151;
    border-color: #d1d5db;
  }
  .btn:hover { background: #f9fafb; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: #166534; color: #fff; border-color: #166534; }
  .btn-primary:hover { background: #14532d; }
  .btn-danger { color: #b91c1c; border-color: #fecaca; background: #fff; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-warning { background: #f59e0b; color: #fff; border-color: #f59e0b; }
  .btn-warning:hover { background: #d97706; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon {
    background: transparent;
    border: none;
    padding: 4px 8px;
    color: #6b7280;
    border-radius: 4px;
  }
  .btn-icon:hover { background: #f3f4f6; color: #1f2937; }

  /* ---------- Cards & Lists ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    transition: box-shadow 0.15s, transform 0.05s;
  }
  .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 8px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    margin: 0;
  }
  .card-subtitle { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .card-actions { display: flex; gap: 4px; }
  .jersey-badge {
    background: #166534;
    color: #fff;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }

  /* ---------- Stat blocks ---------- */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
  }
  .stat {
    background: #f9fafb;
    border-radius: 6px;
    padding: 6px 8px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .stat-value { font-size: 14px; font-weight: 600; color: #111827; }
  .stat-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #6b7280;
    font-weight: 600;
    margin: 12px 0 6px;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    background: #fff;
    border-radius: 10px;
    border: 1px dashed #d1d5db;
    color: #6b7280;
  }
  .empty-state h3 { color: #374151; margin: 0 0 6px; }
  .empty-state p { margin: 0 0 14px; font-size: 14px; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 540px;
    max-height: 95vh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { margin: 0; font-size: 18px; }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal.lg { max-width: 760px; }
  .modal.xl { max-width: 1100px; }
  .modal.full { max-width: none; height: 95vh; }

  /* ---------- Forms ---------- */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    color: #374151;
    font-size: 13px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: #166534;
    box-shadow: 0 0 0 3px rgba(22, 101, 52, 0.12);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .help-text { font-size: 12px; color: #6b7280; margin-top: 4px; }

  /* ---------- Player picker (for teams) ---------- */
  .player-picker {
    border: 1px solid #d1d5db;
    border-radius: 6px;
    max-height: 280px;
    overflow-y: auto;
    background: #fff;
  }
  .player-picker-item {
    padding: 8px 12px;
    border-bottom: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .player-picker-item:last-child { border-bottom: none; }
  .player-picker-item:hover { background: #f9fafb; }
  .player-picker-item input { width: auto; }

  /* ---------- Game lineup (setup) ---------- */
  .game-setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 720px) {
    .game-setup-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  .lineup-team-block h4 {
    margin: 0 0 10px;
    font-size: 15px;
    font-weight: 600;
    color: #166534;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lineup-team-block .team-tag {
    background: #166534;
    color: #fff;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .team-tag.away { background: #b45309; }
  .lineup-list {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    background: #fff;
    overflow: hidden;
  }
  .lineup-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto auto;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid #f3f4f6;
    background: #fff;
  }
  .lineup-row:last-child { border-bottom: none; }
  .lineup-row.dragging { opacity: 0.5; }
  .lineup-row.drop-target { background: #ecfdf5; }
  .lineup-order {
    background: #166534;
    color: #fff;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .lineup-name {
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lineup-name .num {
    color: #6b7280;
    font-weight: 400;
    font-size: 12px;
    margin-right: 4px;
  }
  .lineup-row select {
    padding: 4px 6px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 12px;
  }
  .lineup-handle {
    cursor: grab;
    color: #9ca3af;
    user-select: none;
    padding: 0 6px;
  }
  .lineup-handle:active { cursor: grabbing; }

  /* ---------- Game card ---------- */
  .game-card-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .status-setup { background: #fef3c7; color: #92400e; }
  .status-in_progress { background: #dbeafe; color: #1e40af; }
  .status-completed { background: #d1fae5; color: #065f46; }
  .game-vs {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 14px 0;
  }
  .game-team { flex: 1; text-align: center; }
  .game-team .label {
    font-size: 11px; color: #6b7280;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .game-team .name { font-weight: 600; font-size: 15px; color: #111827; }
  .game-team .score-big { font-size: 28px; font-weight: 700; color: #166534; line-height: 1.1; }
  .game-vs .vs-divider { font-weight: 700; color: #9ca3af; font-size: 13px; }

  /* ---------- Inline game header ---------- */
  .inline-game-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 0;
  }
  .inline-game-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: #111827; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ---------- Games split panel ---------- */
  .games-split { grid-template-columns: 210px 1fr; }
  .games-detail-panel { padding: 0; overflow-y: auto; max-height: 82vh; }
  #games-detail .live-game { height: auto; min-height: 400px; overflow: visible; }
  #games-detail .live-game-left, #games-detail .live-game-right { overflow-y: visible; }

  /* ============================================================
     LIVE GAME SCREEN
     ============================================================ */
  .live-game {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 18px;
    padding: 18px;
    background: #f4f6f8;
    height: 95vh;
    overflow: hidden;
  }
  @media (max-width: 920px) {
    .live-game { grid-template-columns: 1fr; height: auto; max-height: none; overflow-y: auto; }
  }
  .live-game-left { display: flex; flex-direction: column; gap: 14px; min-height: 0; overflow-y: auto; }
  .live-game-right { display: flex; flex-direction: column; gap: 14px; min-height: 0; overflow-y: auto; }

  .scoreboard {
    background: #14532d;
    color: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .scoreboard .team-side { text-align: center; }
  .scoreboard .team-side .name {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }
  .scoreboard .team-side .score { font-size: 38px; font-weight: 700; line-height: 1; }
  .scoreboard .team-side.batting .score { color: #facc15; }
  .scoreboard .middle {
    text-align: center;
    border-left: 1px solid rgba(255,255,255,0.2);
    border-right: 1px solid rgba(255,255,255,0.2);
    padding: 0 12px;
  }
  .scoreboard .middle .inning { font-size: 15px; font-weight: 600; }
  .scoreboard .middle .outs {
    margin-top: 4px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }
  .scoreboard .middle .out-dots {
    display: inline-flex;
    gap: 3px;
    margin-left: 4px;
  }
  .scoreboard .middle .out-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid #facc15;
    display: inline-block;
  }
  .scoreboard .middle .out-dot.on { background: #facc15; }

  .field-wrap {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .field-wrap h3 {
    margin: 0 0 10px;
    font-size: 14px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .field-svg {
    width: 100%;
    height: auto;
    max-height: 460px;
    display: block;
    user-select: none;
  }
  .field-svg .grass { fill: #5e8c3a; }
  .field-svg .dirt  { fill: #c89968; }
  .field-svg .double-line { stroke: rgba(255,255,255,0.65); stroke-width: 2; fill: none; }
  .field-svg .base { fill: #f9fafb; stroke: #1f2937; stroke-width: 1; }
  .field-svg .base.occupied { fill: #facc15; stroke: #92400e; }
  .field-svg .mound { fill: #b07a44; }
  .field-svg .fielder { cursor: pointer; }
  .field-svg .fielder.dragging { opacity: 0.5; }
  .field-svg .fielder circle {
    fill: #1e3a8a;
    stroke: #fff;
    stroke-width: 2.5;
    transition: r 0.1s, stroke-width 0.1s;
  }
  .field-svg .fielder:hover circle {
    stroke: #facc15;
    stroke-width: 3;
  }
  .field-svg .fielder text.pos {
    fill: #fff;
    font-size: 13px;
    font-weight: 800;
    pointer-events: none;
    text-anchor: middle;
  }
  .field-svg .fielder text.name {
    fill: #1f2937;
    font-size: 11px;
    font-weight: 600;
    pointer-events: none;
    text-anchor: middle;
  }
  .field-svg .fielder text.name.bg {
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    paint-order: stroke;
  }
  .field-svg .runner-tag {
    pointer-events: none;
  }
  .field-svg .runner-tag rect {
    fill: #fff;
    stroke: #166534;
    stroke-width: 1.5;
  }
  .field-svg .runner-tag text {
    fill: #166534;
    font-size: 10px;
    font-weight: 700;
    text-anchor: middle;
  }
  .field-svg .ball-marker {
    fill: #fff;
    stroke: #b91c1c;
    stroke-width: 2;
    pointer-events: none;
  }
  .badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; text-transform:uppercase; letter-spacing:0.4px; margin-left:6px; }
  .badge-guest { background:#f3f4f6; color:#6b7280; }
  .badge-invited { background:#fef3c7; color:#92400e; }
  .badge-linked { background:#d1fae5; color:#065f46; }

  /* ---------- Admin mode toggle ---------- */
  .admin-mode-toggle {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2px;
    gap: 0;
  }
  .admin-mode-toggle button {
    padding: 3px 10px;
    border-radius: 16px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.65);
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .admin-mode-toggle button.active { background: #facc15; color: #14532d; }

  /* ---------- Players sub-nav ---------- */
  .players-subnav {
    display: flex;
    border-bottom: 2px solid #e5e7eb;
    margin-bottom: 18px;
  }
  .players-subnav button {
    background: none;
    border: none;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #6b7280;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .players-subnav button:hover { color: #166534; }
  .players-subnav button.active { color: #166534; border-bottom-color: #166534; font-weight: 600; }

  /* ---------- Player split layout ---------- */
  .player-split {
    display: grid;
    grid-template-columns: 230px 1fr;
    gap: 14px;
    align-items: start;
  }
  @media (max-width: 600px) {
    .player-split, .games-split { grid-template-columns: 1fr; }
    main { padding: 12px; }
    .toolbar { flex-wrap: wrap; gap: 8px; }
    .modal-backdrop .modal { margin: 0 8px; }
    .field-and-bases { flex-direction: column; }
    .bases-panel { flex: none; width: 100%; }
    .count-row { gap: 8px; }
    .count-block { min-width: 44px; }
    .pitch-buttons button { padding: 12px 8px; font-size: 13px; }
    .at-bat-card { padding: 12px; }
    .scoreboard { gap: 8px; }
    .scoreboard .score { font-size: 32px; }
    .player-detail-panel { max-height: none; }
    .games-detail-panel { max-height: none; }
  }
  @media (max-width: 480px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 18px; }
    .storage-controls { gap: 6px; font-size: 12px; }
    nav.tabs button { padding: 10px 14px; font-size: 13px; }
    .stat-row-lg { gap: 6px; }
    .stat-lg { min-width: 44px; }
    .live-game { padding: 10px; gap: 10px; }
    .detail-player-name { font-size: 17px; }
    .outcome-grid { grid-template-columns: 1fr 1fr; }
  }

  .player-list-panel {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    max-height: 72vh;
    overflow-y: auto;
  }
  .player-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f3f4f6;
    border-left: 3px solid transparent;
    transition: background 0.1s;
  }
  .player-list-item:last-child { border-bottom: none; }
  .player-list-item:hover { background: #f9fafb; }
  .player-list-item.selected { background: #f0fdf4; border-left-color: #166534; }
  .player-list-item.selected .pli-name { color: #166534; font-weight: 700; }
  .pli-name { font-size: 14px; font-weight: 600; color: #111827; }
  .pli-sub { font-size: 11px; color: #9ca3af; margin-top: 1px; }

  /* ---------- Player detail panel ---------- */
  .player-detail-panel {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    padding: 20px;
    min-height: 340px;
  }
  .player-detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 280px;
    color: #9ca3af;
    font-size: 14px;
    flex-direction: column;
    gap: 10px;
  }
  .detail-player-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid #f3f4f6;
    margin-bottom: 14px;
  }
  .jersey-badge-lg {
    background: #166534;
    color: #fff;
    width: 48px; height: 48px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;

<script>
/* =====================================================
   WIFFLEBALL TRACKER
   ===================================================== */

/* ----------- Helpers ----------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const uid = () => 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const escapeHtml = (s) => String(s ?? '')
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

function toast(msg, type = '') {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = 'toast'; }, 2400);
}

/* ============================================================
   STORAGE LAYER (Firestore)
   ============================================================ */
const Storage = {
  async init() {}, // Firebase already initialised by module script

  _unsubs: [], // active onSnapshot unsubscribers

  async loadAll() {
    const fs = window._fs;
    const [ps, ts, gs, us] = await Promise.all([
      fs.getDocs(fs.collection(fs.db, 'players')),
      fs.getDocs(fs.collection(fs.db, 'teams')),
      fs.getDocs(fs.collection(fs.db, 'games')),
      fs.getDocs(fs.collection(fs.db, 'users')),
    ]);
    State.players = ps.docs.map(d => d.data());
    State.teams   = ts.docs.map(d => d.data());
    State.games   = gs.docs.map(d => d.data());
    State.users   = us.docs.map(d => d.data());
  },

  unsubAll() {
    this._unsubs.forEach(u => u());
    this._unsubs = [];
  },

  listenAll() {
    this.unsubAll(); // cancel any existing listeners before re-subscribing
    const fs = window._fs;
    this._unsubs.push(
      fs.onSnapshot(fs.collection(fs.db, 'players'), snap => {
        State.players = snap.docs.map(d => d.data());
        Render.players();
      }, err => console.warn('players listener:', err.message)),

      fs.onSnapshot(fs.collection(fs.db, 'teams'), snap => {
        State.teams = snap.docs.map(d => d.data());
        Render.teams();
      }, err => console.warn('teams listener:', err.message)),

      fs.onSnapshot(fs.collection(fs.db, 'games'), snap => {
        snap.docChanges().forEach(change => {
          const g = change.doc.data();
          if (change.type === 'removed') {
            State.games = State.games.filter(x => x.id !== g.id);
          } else {
            const idx = State.games.findIndex(x => x.id === g.id);
            if (idx >= 0) State.games[idx] = g; else State.games.push(g);
          }
        });
        Render.games();
        if (LiveGameId && $('#live-game-root')) rerenderLive();
        Render.gamestream && Render.gamestream();
      }, err => console.warn('games listener:', err.message)),

      fs.onSnapshot(fs.collection(fs.db, 'users'), snap => {
        State.users = snap.docs.map(d => d.data());
        if (isAdminMode()) Render.users && Render.users();
        // Refresh currentUserProfile in case canScore was changed
        if (currentUser) {
          currentUserProfile = State.getUser(currentUser.uid) || currentUserProfile;
        }
      }, err => console.warn('users listener:', err.message))
    );
  },

  async saveUser(profile) {
    const fs = window._fs;
    await fs.setDoc(fs.doc(fs.db, 'users', profile.uid), profile);
  },
  async getUser(uid) {
    const fs = window._fs;
    const snap = await fs.getDocs(fs.collection(fs.db, 'users'));
    const d = snap.docs.find(x => x.id === uid);
    return d ? d.data() : null;
  },
  async saveAll() { /* no-op — individual saves handle this */ },

  async savePlayer(p) {
    const fs = window._fs;
    await fs.setDoc(fs.doc(fs.db, 'players', p.id), p);
  },
  async removePlayer(id) {
    const fs = window._fs;
    await fs.deleteDoc(fs.doc(fs.db, 'players', id));
  },
  async saveTeam(t) {
    const fs = window._fs;
    await fs.setDoc(fs.doc(fs.db, 'teams', t.id), t);
  },
  async removeTeam(id) {
    const fs = window._fs;
    await fs.deleteDoc(fs.doc(fs.db, 'teams', id));
  },
  async saveGame(g) {
    const fs = window._fs;
    await fs.setDoc(fs.doc(fs.db, 'games', g.id), g);
  },
  async removeGame(id) {
    const fs = window._fs;
    await fs.deleteDoc(fs.doc(fs.db, 'games', id));
  },

  async exportJson() {
    const blob = new Blob([JSON.stringify(State.snapshot(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'wiffleball-data-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  },

  async importJson(file) {
    const text = await file.text();
    const data = JSON.parse(text);
    await Promise.all([
      ...(data.players || []).map(p => Storage.savePlayer(p)),
      ...(data.teams   || []).map(t => Storage.saveTeam(t)),
      ...(data.games   || []).map(g => Storage.saveGame(g)),
    ]);
    toast('Imported successfully', 'success');
  },
};

/* ============================================================
   STATE
   ============================================================ */
const State = {
  players: [],
  teams: [],
  games: [],
  users: [],   // registered user profiles (admin-visible)

  snapshot() { return { players: this.players, teams: this.teams, games: this.games }; },
  getUser(uid) { return this.users.find(u => u.uid === uid) || null; },

  getPlayer(id) { return this.players.find(p => p.id === id); },
  getTeam(id)   { return this.teams.find(t => t.id === id); },
  getGame(id)   { return this.games.find(g => g.id === id); },

  // ---- Player CRUD ----
  async addPlayer(data) {
    const p = { id: uid(), name: data.name.trim(), jerseyNumber: (data.jerseyNumber || '').trim(), createdAt: Date.now() };
    this.players.push(p);
    await Storage.savePlayer(p);
    return p;
  },
  async updatePlayer(id, data) {
    const p = this.getPlayer(id); if (!p) return;
    p.name = data.name.trim();
    p.jerseyNumber = (data.jerseyNumber || '').trim();
    await Storage.savePlayer(p);
  },
  async deletePlayer(id) {
    const teamsToUpdate = this.teams.filter(t => t.playerIds.includes(id));
    this.players = this.players.filter(p => p.id !== id);
    this.teams.forEach(t => { t.playerIds = t.playerIds.filter(pid => pid !== id); });
    await Storage.removePlayer(id);
    await Promise.all(teamsToUpdate.map(t => Storage.saveTeam(t)));
  },

  // ---- Team CRUD ----
  async addTeam(data) {
    const t = { id: uid(), name: data.name.trim(), playerIds: [...(data.playerIds || [])], createdAt: Date.now() };
    this.teams.push(t);
    await Storage.saveTeam(t);
    return t;
  },
  async updateTeam(id, data) {
    const t = this.getTeam(id); if (!t) return;
    t.name = data.name.trim();
    t.playerIds = [...(data.playerIds || [])];
    await Storage.saveTeam(t);
  },
  async deleteTeam(id) {
    this.teams = this.teams.filter(t => t.id !== id);
    await Storage.removeTeam(id);
  },

  // ---- Game CRUD ----
  async addGame(data) {
    const home = this.getTeam(data.homeTeamId);
    const away = this.getTeam(data.awayTeamId);
    if (!home || !away) throw new Error('Both teams required');

    const defaultPositions = (team) => {
      const positions = {};
      const ids = team.playerIds;
      if (ids.length === 2) {
        positions[ids[0]] = 'P';
        positions[ids[1]] = 'CF';
      } else if (ids.length >= 3) {
        positions[ids[0]] = 'P';
        positions[ids[1]] = 'CF';
        for (let i = 2; i < ids.length; i++) positions[ids[i]] = 'EH';
      }
      return positions;
    };

    const g = {
      id: uid(),
      createdAt: Date.now(),
      status: 'setup',
      homeTeamId: home.id,
      awayTeamId: away.id,
      homeBattingOrder: [...home.playerIds],
      awayBattingOrder: [...away.playerIds],
      homePositions: defaultPositions(home),
      awayPositions: defaultPositions(away),

      // Live tracking state
      numInnings: data.numInnings || 7,
      currentInning: 1,
      currentHalf: 'top',  // 'top' = away batting, 'bottom' = home batting
      score: { home: 0, away: 0 },
      lineScore: [],       // [{ inning, top: runs, bottom: runs }]
      outs: 0,
      balls: 0,
      strikes: 0,
      fouls: 0,
      bases: { 1: null, 2: null, 3: null }, // runner objects
      runnerCounter: 0,
      homeBatterIdx: 0,
      awayBatterIdx: 0,
      events: [],

      isOver: false,
    };
    this.games.push(g);
    await Storage.saveGame(g);
    return g;
  },
  async updateGame(id, patch) {
    const g = this.getGame(id);
    if (!g) return;
    Object.assign(g, patch);
    await Storage.saveGame(g);
  },
  async deleteGame(id) {
    this.games = this.games.filter(g => g.id !== id);
    await Storage.removeGame(id);
  },

  // ---- Stat aggregation from event log ----
  computePlayerStats(playerId) {
    let AB=0, H=0, R=0, RBI=0, BB=0, HBP=0, SF=0, TB=0, K_bat=0;
    let K_looking=0, K_swinging=0, K_foul=0;
    let pK=0, pBB=0, pIP_outs=0, pER=0, pKL=0, pKS=0, pKF=0;
    let E=0; // errors
    let singles=0, doubles=0, triples=0, hrs=0;
    const pitchedGames = new Set();

    this.games.forEach(g => {
      (g.events || []).forEach(e => {
        if (e.type !== 'pa_end') return; // only summarize at end of plate appearance
        const isBat = e.batterId === playerId;
        const isPit = e.pitcherId === playerId;

        if (isBat) {
          if (e.outcome === 'BB') BB++;
          else if (e.outcome === '1B') { AB++; H++; singles++; TB += 1; }
          else if (e.outcome === '2B') { AB++; H++; doubles++; TB += 2; }
          else if (e.outcome === '3B') { AB++; H++; triples++; TB += 3; }
          else if (e.outcome === 'HR') { AB++; H++; hrs++; TB += 4; }
          else if (e.outcome === 'K')  {
            AB++; K_bat++;
            if (e.kType === 'looking')  K_looking++;
            else if (e.kType === 'swinging') K_swinging++;
            else if (e.kType === 'foul_out') K_foul++;
          }
          else if (e.outcome === 'OUT') { AB++; }
          else if (e.outcome === 'ERR_REACH') { AB++; } // reached on error: AB but no hit
          RBI += e.rbi || 0;
        }
        if (isPit) {
          if (e.outcome === 'BB') pBB++;
          if (e.outcome === 'K') {
            pK++;
            if (e.kType === 'looking')  pKL++;
            else if (e.kType === 'swinging') pKS++;
            else if (e.kType === 'foul_out') pKF++;
          }
          // Innings pitched: count outs recorded by this pitcher (K, OUT)
          if (e.outcome === 'K' || e.outcome === 'OUT') pIP_outs++;
          pER += e.earnedRuns || 0;
          pitchedGames.add(g.id);
        }
        if (e.errorById === playerId) E++;
        if (e.runsScoredBy && e.runsScoredBy.includes(playerId)) R++;
      });
    });

    const PA = AB + BB + HBP + SF;
    const AVG = AB ? H / AB : 0;
    const OBP = PA ? (H + BB + HBP) / PA : 0;
    const SLG = AB ? TB / AB : 0;
    const OPS = OBP + SLG;
    const IP = pIP_outs / 3;
    const ERA = IP > 0 ? (pER * 9) / IP : null;
    const pGP = pitchedGames.size;

    return {
      AB, H, R, RBI, BB, K_bat, K_looking, K_swinging, K_foul, AVG, OBP, SLG, OPS, PA, TB,
      singles, doubles, triples, hrs,
      pK, pKL, pKS, pKF, pBB, pER, IP, ERA, E, pGP,
    };
  },

  computeTeamStats(teamId) {
    const games = this.games.filter(g => g.homeTeamId === teamId || g.awayTeamId === teamId);
    const completed = games.filter(g => g.status === 'completed');
    let wins = 0, losses = 0, ties = 0, runsFor = 0, runsAgainst = 0;
    completed.forEach(g => {
      const isHome = g.homeTeamId === teamId;
      const my = isHome ? g.score.home : g.score.away;
      const opp = isHome ? g.score.away : g.score.home;
      runsFor += my; runsAgainst += opp;
      if (my > opp) wins++;
      else if (my < opp) losses++;
      else ties++;
    });
    return {
      gamesPlayed: completed.length,
      gamesScheduled: games.length - completed.length,
      wins, losses, ties, runsFor, runsAgainst,
    };
  },

  computeTeamBattingStats(teamId) {
    let AB=0, H=0, R=0, RBI=0, BB=0, TB=0, K=0, singles=0, doubles=0, triples=0, hrs=0;
    this.games.forEach(g => {
      if (g.homeTeamId !== teamId && g.awayTeamId !== teamId) return;
      const battingHalf = g.homeTeamId === teamId ? 'bottom' : 'top';
      (g.events || []).forEach(e => {
        if (e.type !== 'pa_end' || e.half !== battingHalf) return;
        if (e.outcome === 'BB') BB++;
        else if (e.outcome === '1B') { AB++; H++; singles++; TB += 1; }
        else if (e.outcome === '2B') { AB++; H++; doubles++; TB += 2; }
        else if (e.outcome === '3B') { AB++; H++; triples++; TB += 3; }
        else if (e.outcome === 'HR') { AB++; H++; hrs++; TB += 4; }
        else if (e.outcome === 'K')  { AB++; K++; }
        else if (e.outcome === 'OUT' || e.outcome === 'ERR_REACH') AB++;
        RBI += e.rbi || 0;
        R += (e.runsScoredBy || []).length;
      });
    });
    const PA = AB + BB;
    return {
      PA, AB, H, R, RBI, BB, K, TB, singles, doubles, triples, hrs,
      AVG: AB ? H / AB : 0,
      OBP: PA ? (H + BB) / PA : 0,
      SLG: AB ? TB / AB : 0,
    };
  },

  computeTeamPitchingStats(teamId) {
    let outs=0, ER=0, K=0, BB=0, H=0;
    this.games.forEach(g => {
      if (g.homeTeamId !== teamId && g.awayTeamId !== teamId) return;
      const pitchingHalf = g.homeTeamId === teamId ? 'top' : 'bottom';
      (g.events || []).forEach(e => {
        if (e.type !== 'pa_end' || e.half !== pitchingHalf) return;
        if (e.outcome === 'K')  { K++; outs++; }
        else if (e.outcome === 'OUT') outs++;
        else if (e.outcome === 'BB') BB++;
        else if (['1B','2B','3B','HR'].includes(e.outcome)) H++;
        ER += e.earnedRuns || 0;
      });
    });
    const IP = outs / 3;
    return { IP, ER, K, BB, H, ERA: IP > 0 ? (ER * 9) / IP : null };
  },

  // Hit locations across all games for a player
  getPlayerHitLocations(playerId) {
    const locs = [];
    this.games.forEach(g => {
      (g.events || []).forEach(e => {
        if (e.type === 'pa_end' && e.batterId === playerId && e.location) {
          locs.push({ ...e.location, outcome: e.outcome });
        }
      });
    });
    return locs;
  }
};

/* ============================================================
   GAME LOGIC: base running, pitch handling
   ============================================================ */

// targetBase: 1, 2, 3, or 4 (home / scored)
// Returns { newBases, runnerIdsScored }
function advanceRunners(bases, targetBase, batterRunner) {
  const newBases = { 1: bases[1], 2: bases[2], 3: bases[3] };
  const runnerIdsScored = [];

  // Home run: everyone scores, batter scores
  if (targetBase === 4) {
    for (let b = 3; b >= 1; b--) {
      if (newBases[b]) { runnerIdsScored.push(newBases[b].id); newBases[b] = null; }
    }
    runnerIdsScored.push(batterRunner.id);
    return { newBases, runnerIdsScored };
  }

  // Place batter on target base, cascade if occupied
  let toForce = newBases[targetBase];
  newBases[targetBase] = batterRunner;
  let nextBase = targetBase + 1;
  while (toForce) {
    if (nextBase > 3) {
      runnerIdsScored.push(toForce.id);
      toForce = null;
    } else {
      const next = newBases[nextBase];
      newBases[nextBase] = toForce;
      toForce = next;
      nextBase++;
    }
  }
  return { newBases, runnerIdsScored };
}

// Walk: batter to 1B with force-only chain
function walkAdvance(bases, batterRunner) {
  return advanceRunners(bases, 1, batterRunner);
}

const battingTeamId = (g) => g.currentHalf === 'top' ? g.awayTeamId : g.homeTeamId;
const fieldingTeamId = (g) => g.currentHalf === 'top' ? g.homeTeamId : g.awayTeamId;
const battingOrderArr = (g) => g.currentHalf === 'top' ? g.awayBattingOrder : g.homeBattingOrder;
const fieldingPositions = (g) => g.currentHalf === 'top' ? g.homePositions : g.awayPositions;
const battingPositions = (g) => g.currentHalf === 'top' ? g.awayPositions : g.homePositions;
const battingIdxKey = (g) => g.currentHalf === 'top' ? 'awayBatterIdx' : 'homeBatterIdx';

function currentBatterId(g) {
  const order = battingOrderArr(g);
  const idx = g[battingIdxKey(g)] % order.length;
  return order[idx];
}
function nextBatterId(g) {
  const order = battingOrderArr(g);
  const idx = (g[battingIdxKey(g)] + 1) % order.length;
  return order[idx];
}
function currentPitcherId(g) {
  const positions = fieldingPositions(g);
  return Object.keys(positions).find(pid => positions[pid] === 'P');
}
function currentCFId(g) {
  const positions = fieldingPositions(g);
  return Object.keys(positions).find(pid => positions[pid] === 'CF');
}

function makeRunner(g, playerId) {
  g.runnerCounter = (g.runnerCounter || 0) + 1;
  const player = State.getPlayer(playerId);
  return {
    id: uid(),
    playerId,
    name: player ? player.name.split(' ')[0] : '?',
    number: g.runnerCounter,
  };
}

/* ============================================================
   RENDER LAYER
   ============================================================ */
const fmt = {
  avg(n) { return n ? n.toFixed(3).replace(/^0/, '') : '.000'; },
  ip(n) {
    const whole = Math.floor(n);
    const frac = Math.round((n - whole) * 3);
    return whole + (frac ? '.' + frac : '.0');
  },
};

    email: user.email,
    name: name || user.displayName || user.email.split('@')[0],

        ${mode === 'signup' ? `<div class="form-group"><label>Name</label><input name="uname" type="text" required autofocus placeholder="Your name" /></div>` : ''}
        <div class="form-group"><label>Email</label><input name="email" type="email" required ${mode === 'signin' ? 'autofocus' : ''} /></div>
        <div class="form-group"><label>Password</label><input name="password" type="password" required minlength="6" /></div>
      </div>
      <div class="modal-footer">
        <p style="margin:0 auto 0 0;font-size:13px">
          ${mode === 'signin'
            ? `No account? <a href="#" onclick="Modal.hide();showAuthModal('signup');return false">Create one</a>`
            : `Have an account? <a href="#" onclick="Modal.hide();showAuthModal('signin');return false">Sign in</a>`}
        </p>
        <button type="button" class="btn" onclick="Modal.hide()">Cancel</button>
        <button type="submit" class="btn btn-primary">${mode === 'signin' ? 'Sign In' : 'Create Account'}</button>
      </div>
    </form>`);
}

async function submitAuth(event, mode) {
  event.preventDefault();
  const form = event.target;
  const email = form.email.value.trim();
  const password = form.password.value;
  const fs = window._fs;
  try {
    if (mode === 'signup') {
      const name = form.uname.value.trim();
      const cred = await fs.createUserWithEmailAndPassword(fs.auth, email, password);
      const invitedPlayer = State.players.find(p => p.inviteEmail === email);
      await createOrLinkUserProfile(cred.user, invitedPlayer?.id || null, name);
      Modal.hide();
      toast('Welcome to WiffleCast!', 'success');
    } else {
      await fs.signInWithEmailAndPassword(fs.auth, email, password);
      Modal.hide();
      toast('Signed in!', 'success');
    }
  } catch (err) {
    // Show error inside the modal so it's hard to miss; include raw code for debugging
    const friendly = authErrorMessage(err.code);
    const debug = err.code ? ` (${err.code})` : '';
    showAuthModal(mode, friendly + debug);
  }
}

async function signOutUser() {
  await window._fs.signOut(window._fs.auth);
  currentUser = null;
  currentUserProfile = null;
  updateAuthUI();
  Render.all();
  toast('Signed out');
}

async function invitePlayer(playerId) {
  const player = State.getPlayer(playerId);
  if (!player) return;
  const email = window.prompt(`Enter email address to invite for ${player.name}:`);
  if (!email || !email.includes('@')) { if (email !== null) toast('Invalid email', 'error'); return; }
  const actionCodeSettings = {
    url: window.location.origin + window.location.pathname + '?invitePlayerId=' + playerId,
    handleCodeInApp: true,
  };
  try {
    await window._fs.sendSignInLinkToEmail(window._fs.auth, email, actionCodeSettings);
    localStorage.setItem('wc_invite_email', email);
    localStorage.setItem('wc_invite_pid', playerId);
    player.inviteEmail = email;
    player.invitePending = true;
    await Storage.savePlayer(player);
    Render.players();
    toast('Invite sent to ' + email, 'success');
  } catch (err) {
    toast('Could not send invite: ' + err.message, 'error');
  }
}

async function handleEmailLinkSignIn() {
  const fs = window._fs;
  const params = new URLSearchParams(window.location.search);
  const playerId = params.get('invitePlayerId') || localStorage.getItem('wc_invite_pid');
  let email = localStorage.getItem('wc_invite_email');
  if (!email) email = window.prompt('Please confirm your email address to complete sign-in:');
  if (!email) return;
  try {
    const result = await fs.signInWithEmailLink(fs.auth, email, window.location.href);
    localStorage.removeItem('wc_invite_email');
    localStorage.removeItem('wc_invite_pid');
    history.replaceState({}, '', window.location.pathname);
    const name = window.prompt('Welcome! Enter your display name:') || email.split('@')[0];
    await createOrLinkUserProfile(result.user, playerId, name);
    toast('Welcome to WiffleCast, ' + (currentUserProfile?.name || '') + '!', 'success');
  } catch (err) {
    toast('Sign-in link issue: ' + err.message, 'error');
  }
}

async function toggleCanScore(uid) {
  const user = State.getUser(uid);

  const updated = { ...user, canScore: !user.canScore };

  toast(`${updated.name || uid}: scoring ${updated.canScore ? 'enabled' : 'disabled'}`, 'success');
}

        return b.p.name.localeCompare(a.p.name) * sort.dir;
      }
      let av = a.s[sort.col] ?? null;
      let bv = b.s[sort.col] ?? null;
      // ERA null means didn't pitch — push to bottom regardless of sort direction
      const col = cols.find(c => c.key === sort.col);
      // nullLow: null values always sort to the bottom regardless of direction
      if (av === null) av = sort.dir > 0 ? Infinity  : -Infinity;
      if (bv === null) bv = sort.dir > 0 ? Infinity  : -Infinity;
      // dir -1 = desc (b-a), dir 1 = asc (a-b)
      return (bv - av) * sort.dir;

    const listItems = sorted.map(t => {

        </div>
        <div class="stat-section-title">Counting</div>
        <div class="stat-row-lg">
          <div class="stat-lg"><div class="stat-label">PA</div><div class="stat-value">${bat.PA}</div></div>
          <div class="stat-lg"><div class="stat-label">AB</div><div class="stat-value">${bat.AB}</div></div>
          <div class="stat-lg"><div class="stat-label">H</div><div class="stat-value">${bat.H}</div></div>
          <div class="stat-lg"><div class="stat-label">1B</div><div class="stat-value">${bat.singles}</div></div>
          <div class="stat-lg"><div class="stat-label">2B</div><div class="stat-value">${bat.doubles}</div></div>
          <div class="stat-lg"><div class="stat-label">3B</div><div class="stat-value">${bat.triples}</div></div>
          <div class="stat-lg"><div class="stat-label">HR</div><div class="stat-value">${bat.hrs}</div></div>
          <div class="stat-lg"><div class="stat-label">R</div><div class="stat-value">${bat.R}</div></div>
          <div class="stat-lg"><div class="stat-label">RBI</div><div class="stat-value">${bat.RBI}</div></div>
          <div class="stat-lg"><div class="stat-label">BB</div><div class="stat-value">${bat.BB}</div></div>
          <div class="stat-lg"><div class="stat-label">K</div><div class="stat-value">${bat.K}</div></div>
        </div>`;

      const pitHtml = `
        <div class="stat-section-title" style="margin-top:0">Rate</div>
        <div class="stat-row-lg">
          <div class="stat-lg hi"><div class="stat-label">ERA</div><div class="stat-value">${pit.ERA !== null ? pit.ERA.toFixed(2) : '—'}</div></div>
          <div class="stat-lg hi"><div class="stat-label">IP</div><div class="stat-value">${fmt.ip(pit.IP)}</div></div>
        </div>
        <div class="stat-section-title">Counting</div>
        <div class="stat-row-lg">
          <div class="stat-lg"><div class="stat-label">K</div><div class="stat-value">${pit.K}</div></div>
          <div class="stat-lg"><div class="stat-label">BB</div><div class="stat-value">${pit.BB}</div></div>
          <div class="stat-lg"><div class="stat-label">H</div><div class="stat-value">${pit.H}</div></div>
          <div class="stat-lg"><div class="stat-label">ER</div><div class="stat-value">${pit.ER}</div></div>
        </div>`;

      detailHtml = `
        <div class="detail-player-header">
          <div>
            <div class="detail-player-name">${escapeHtml(sel.name)}</div>
            <div class="detail-player-sub">${s.wins}-${s.losses}${s.ties ? '-'+s.ties : ''} · ${s.gamesPlayed} GP · RF ${s.runsFor} / RA ${s.runsAgainst}</div>

        <div class="detail-tabs">

      </div>`;
      return;

    const sorted = [...State.games].sort((a, b) => b.createdAt - a.createdAt);
    // Keep selectedGameId valid
    if (selectedGameId && !State.getGame(selectedGameId)) selectedGameId = null;
    listEl.innerHTML = sorted.map(g => {
      const home = State.getTeam(g.homeTeamId);
      const away = State.getTeam(g.awayTeamId);

      const showScore = g.status !== 'setup';
      const inningStr = g.status === 'in_progress'
        ? `${g.currentHalf === 'top' ? 'Top' : 'Bot'} ${g.currentInning}`
        : (g.status === 'completed' ? 'Final' : '');
      const active = g.id === selectedGameId ? 'selected' : '';
      return `<div class="player-list-item game-list-item ${active}" onclick="selectGame('${g.id}')">

        </div>
      </div>`;
    }).join('');
  }
};

/* ============================================================
   MODAL INFRASTRUCTURE
   ============================================================ */
const Modal = {
  show(html, { wide = false, xl = false, full = false } = {}) {
    const m = $('#modal');
    m.classList.remove('lg', 'xl', 'full');
    if (wide) m.classList.add('lg');
    if (xl) m.classList.add('xl');
    if (full) m.classList.add('full');
    $('#modal-content').innerHTML = html;
    $('#modal-backdrop').classList.add('show');
  },
  hide() {
    $('#modal-backdrop').classList.remove('show');
    $('#modal-content').innerHTML = '';
  }
};
$('#modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modal-backdrop') Modal.hide();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') Modal.hide();
});

function showPlayerModal(id = null) {
  const editing = id ? State.getPlayer(id) : null;
  Modal.show(`

      <button class="btn-icon" onclick="Modal.hide()">✕</button>
    </div>

          <label for="player-name">Name</label>

async function submitPlayer(e, id) {
  e.preventDefault();
  const data = { name: $('#player-name').value, jerseyNumber: $('#player-jersey').value };

  if (id) await State.updatePlayer(id, data);

  toast(id ? 'Player updated' : 'Player added', 'success');

async function deletePlayer(id) {

  await State.deletePlayer(id);
  Render.all();
  toast('Player deleted');
}

/* ============================================================
   GAME SETUP SCREEN (lineup + positions, then Start)
   ============================================================ */
function renderGameSetup(g) {
  const home = State.getTeam(g.homeTeamId);
  const away = State.getTeam(g.awayTeamId);
  if (!home || !away) { toast('Game has missing teams', 'error'); return; }
  const detail = $('#games-detail');
  if (!detail) return;
  detail.innerHTML = `
    <div class="inline-game-header">
      <h3>${escapeHtml(away.name)} @ ${escapeHtml(home.name)}
        <span class="game-card-status status-setup" style="margin-left:8px">setup</span>
      </h3>
    </div>
    <div style="padding:0 20px 8px">
      <p class="help-text" style="margin-bottom:18px">
        Set the batting order (drag the ⋮⋮ handle or use ↑/↓) and assign starting field positions.
        Batting order stays fixed once the game starts; positions can be changed any time during the game.
      </p>
      <div class="game-setup-grid">
        <div class="lineup-team-block">
          <h4>${escapeHtml(away.name)} <span class="team-tag away">Away</span></h4>
          <ul class="lineup-list" id="lineup-away" data-team="away" data-game="${g.id}"></ul>
        </div>
        <div class="lineup-team-block">
          <h4>${escapeHtml(home.name)} <span class="team-tag">Home</span></h4>
          <ul class="lineup-list" id="lineup-home" data-team="home" data-game="${g.id}"></ul>
        </div>
      </div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-primary" onclick="startGame('${g.id}')">Start game →</button>
    </div>`;
  renderLineup(g, 'away');
  renderLineup(g, 'home');
}

function renderLineup(g, side) {
  const team = side === 'home' ? State.getTeam(g.homeTeamId) : State.getTeam(g.awayTeamId);
  const order = side === 'home' ? g.homeBattingOrder : g.awayBattingOrder;
  const positions = side === 'home' ? g.homePositions : g.awayPositions;
  const list = $('#lineup-' + side);
  if (!list) return;

  const positionOptions = (currentPos) => {
    const opts = [
      { v: 'P', label: 'Pitcher (P)' },
      { v: 'CF', label: 'Center Field (CF)' },
    ];
    if (team.playerIds.length >= 3) opts.push({ v: 'EH', label: 'Extra Hitter (EH)' });
    opts.push({ v: 'BENCH', label: 'Bench' });
    return opts.map(o => `<option value="${o.v}" ${o.v === currentPos ? 'selected' : ''}>${o.label}</option>`).join('');
  };

  list.innerHTML = order.map((pid, idx) => {
    const p = State.getPlayer(pid); if (!p) return '';
    const pos = positions[pid] || 'BENCH';
    return `<li class="lineup-row" draggable="true" data-pid="${pid}">
      <span class="lineup-handle" title="Drag to reorder">⋮⋮</span>
      <span class="lineup-order">${idx + 1}</span>
      <span class="lineup-name">
        <span class="num">#${escapeHtml(p.jerseyNumber || '-')}</span>
        ${escapeHtml(p.name)}
      </span>
      <select onchange="setPosition('${g.id}', '${side}', '${pid}', this.value)">${positionOptions(pos)}</select>
      <button class="btn-icon btn-sm" title="Move up" onclick="moveBatter('${g.id}', '${side}', ${idx}, -1)">↑</button>
      <button class="btn-icon btn-sm" title="Move down" onclick="moveBatter('${g.id}', '${side}', ${idx}, 1)">↓</button>
    </li>`;
  }).join('');

  // Drag & drop reordering
  let draggedIdx = null;
  list.querySelectorAll('.lineup-row').forEach((row, idx) => {
    row.addEventListener('dragstart', (e) => {
      draggedIdx = idx;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      list.querySelectorAll('.drop-target').forEach(r => r.classList.remove('drop-target'));
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.drop-target').forEach(r => r.classList.remove('drop-target'));
      row.classList.add('drop-target');
    });
    row.addEventListener('drop', async (e) => {
      e.preventDefault();
      if (draggedIdx === null || draggedIdx === idx) return;
      const arr = [...order];
      const [moved] = arr.splice(draggedIdx, 1);
      arr.splice(idx, 0, moved);
      const patch = side === 'home' ? { homeBattingOrder: arr } : { awayBattingOrder: arr };
      await State.updateGame(g.id, patch);
      const fresh = State.getGame(g.id);
      renderLineup(fresh, side);
    });
  });
}

async function setPosition(gameId, side, playerId, position) {
  const g = State.getGame(gameId); if (!g) return;
  const positions = side === 'home' ? { ...g.homePositions } : { ...g.awayPositions };
  positions[playerId] = position;
  if (position === 'P' || position === 'CF') {
    Object.keys(positions).forEach(pid => {
      if (pid !== playerId && positions[pid] === position) positions[pid] = 'BENCH';
    });
  }
  const patch = side === 'home' ? { homePositions: positions } : { awayPositions: positions };
  await State.updateGame(gameId, patch);
  const fresh = State.getGame(gameId);
  renderLineup(fresh, side);
}

async function moveBatter(gameId, side, idx, delta) {
  const g = State.getGame(gameId); if (!g) return;
  const order = [...(side === 'home' ? g.homeBattingOrder : g.awayBattingOrder)];
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  const patch = side === 'home' ? { homeBattingOrder: order } : { awayBattingOrder: order };
  await State.updateGame(gameId, patch);
  const fresh = State.getGame(gameId);
  renderLineup(fresh, side);
}

async function startGame(gameId) {
  const g = State.getGame(gameId); if (!g) return;
  const checkPositions = (team, positions, teamName) => {
    const hasP = team.playerIds.some(pid => positions[pid] === 'P');
    const hasCF = team.playerIds.some(pid => positions[pid] === 'CF');
    if (!hasP) { toast(`${teamName} needs a Pitcher assigned`, 'error'); return false; }
    if (!hasCF) { toast(`${teamName} needs a Center Fielder assigned`, 'error'); return false; }
    return true;
  };
  const home = State.getTeam(g.homeTeamId), away = State.getTeam(g.awayTeamId);
  if (!checkPositions(home, g.homePositions, home.name)) return;
  if (!checkPositions(away, g.awayPositions, away.name)) return;
  await State.updateGame(gameId, { status: 'in_progress' });
  Render.games();
  renderLiveGame(gameId);
}

/* ============================================================
   LIVE GAME SCREEN
   ============================================================ */
let LiveGameId = null;
let _selectedPlayTs = null;
const _undoStack = [];
const _redoStack = [];

const _SNAPSHOT_KEYS = [
  'bases','outs','balls','strikes','fouls',
  'score','lineScore','events',
  'awayBatterIdx','homeBatterIdx',
  'currentInning','currentHalf','status','runnerCounter'
];

function captureSnapshot(g) {
  return _SNAPSHOT_KEYS.reduce((s, k) => {
    s[k] = JSON.parse(JSON.stringify(g[k] ?? null));
    return s;
  }, {});
}

async function undoPlay() {
  if (!_undoStack.length) { toast('Nothing to undo', 'error'); return; }
  const g = State.getGame(LiveGameId); if (!g) return;
  const snap = _undoStack.pop();
  _redoStack.push(captureSnapshot(g));
  await State.updateGame(g.id, snap);
  renderLiveGame(g.id);
  toast('Undone');
}

async function redoPlay() {
  if (!_redoStack.length) { toast('Nothing to redo', 'error'); return; }
  const g = State.getGame(LiveGameId); if (!g) return;
  const snap = _redoStack.pop();
  _undoStack.push(captureSnapshot(g));
  await State.updateGame(g.id, snap);
  renderLiveGame(g.id);
  toast('Redone');
}

function renderLiveGame(gameId) {
  if (gameId !== LiveGameId) {
    _undoStack.length = 0;
    _redoStack.length = 0;
  }
  LiveGameId = gameId;
  _selectedPlayTs = null;
  const g = State.getGame(gameId);
  if (!g) return;
  const home = State.getTeam(g.homeTeamId);
  const away = State.getTeam(g.awayTeamId);

  if (detail) {
    detail.innerHTML = `<div id="live-game-root">${liveGameHTML(g, home, away)}</div>`;

  drawBases();
  attachPitchHandlers();
}

function renderPitcherRow(g) {
  const pitcherId = currentPitcherId(g);
  const pitcher = pitcherId ? State.getPlayer(pitcherId) : null;

    <div class="at-bat-row" style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f3f4f6">
      <div class="role">P</div>
      <div>
        <span class="player-num">#${escapeHtml(pitcher?.jerseyNumber || '-')}</span>
        <span>${escapeHtml(pitcher?.name || '?')}</span>
        <div class="game-stats">${pitcherId ? pitcherGameStats(g, pitcherId) : ''}</div>
      </div>
    </div>
  `;
}

function batterGameStats(g, batterId) {
  let ab = 0, h = 0, bb = 0, k = 0, rbi = 0;
  (g.events || []).forEach(e => {
    if (e.type !== 'pa_end' || e.batterId !== batterId) return;
    if (e.outcome === 'BB') { bb++; return; }
    ab++;
    if (['1B','2B','3B','HR'].includes(e.outcome)) h++;
    if (e.outcome === 'K') k++;
    rbi += e.rbi || 0;
  });
  const parts = [`${h}-${ab}`];
  if (bb)  parts.push(`${bb} BB`);
  if (k)   parts.push(`${k} K`);
  if (rbi) parts.push(`${rbi} RBI`);
  return parts.join(', ');
}

function pitcherGameStats(g, pitcherId) {
  let k = 0, bb = 0, h = 0, er = 0;
  (g.events || []).forEach(e => {
    if (e.type !== 'pa_end' || e.pitcherId !== pitcherId) return;
    if (e.outcome === 'K')  k++;
    if (e.outcome === 'BB') bb++;
    if (['1B','2B','3B','HR'].includes(e.outcome)) h++;
    er += e.earnedRuns || 0;
  });
  return `${k} K · ${bb} BB · ${h} H · ${er} ER`;
}

function rerenderLive() {
  if (LiveGameId) renderLiveGame(LiveGameId);
}

function renderBatterRow(g) {
  const batterId = currentBatterId(g);
  const onDeckId = nextBatterId(g);
  const pitcherId = currentPitcherId(g);

    <div class="at-bat-row">
      <div class="role">${idx}</div>

        <span class="player-num">#${escapeHtml(batter?.jerseyNumber || '-')}</span>
        <span class="player-name">${escapeHtml(batter?.name || '?')}</span>
        <div class="game-stats">${batterId ? batterGameStats(g, batterId) : ''}</div>
      </div>
    </div>
    <div class="at-bat-row">
      <div class="role">Next</div>
      <div class="muted">
        <span class="player-num">#${escapeHtml(onDeck?.jerseyNumber || '-')}</span>
        ${escapeHtml(onDeck?.name || '?')}
      </div>
    </div>
  `;
}

function renderPlayLog(g) {
  const events = (g.events || []).filter(e => e.type === 'pa_end').slice().reverse();
  if (!events.length) return '<li class="muted small">No plays yet.</li>';
  const isCompleted = g.status === 'completed';
  const parts = [];
  let lastKey = null;
  events.slice(0, 60).forEach(e => {
    const key = e.inning + '-' + e.half;
    if (key !== lastKey) {
      parts.push(`<li class="play-inning-break">${e.half === 'top' ? 'Top' : 'Bottom'} ${ordinal(e.inning)}</li>`);
      lastKey = key;
    }
    const batter = State.getPlayer(e.batterId);
    const desc = describeOutcome(e);
    const handler = isCompleted ? `data-ts="${e.ts}" onclick="selectPlay(${e.ts})"` : '';
    const scorerTag = isAdminMode() && e.scoredByName ? ` <span class="play-scorer" title="Scored by ${escapeHtml(e.scoredByName)}">✎${escapeHtml(e.scoredByName)}</span>` : '';
    parts.push(`<li class="play-entry${isCompleted ? ' clickable' : ''}" ${handler}><span class="play-meta">${e.half === 'top' ? 'T' : 'B'}${e.inning}</span> ${escapeHtml(batter?.name || '?')} — ${desc}${scorerTag}</li>`);
  });
  return parts.join('');
}

function describeOutcome(e) {
  const map = {
    'BB': 'Walk',
    'K': 'Strikeout',
    '1B': 'Single',
    '2B': 'Double',
    '3B': 'Triple',
    'HR': 'Home Run',
    'OUT': `Out${e.hitType ? ' (' + hitTypeLabel(e.hitType) + ')' : ''}`,
    'ERR_REACH': `Reached on error${e.errBase ? ' (' + e.errBase + ')' : ''}`,
  };
  let s = map[e.outcome] || e.outcome;
  if (e.rbi) s += ` · ${e.rbi} RBI`;
  return s;
}
function hitTypeLabel(t) {
  return ({ GB: 'ground ball', LD: 'line drive', PU: 'pop fly', FB: 'fly ball' })[t] || t;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function replayToEvent(g, targetPaIdx) {
  const paEvents = (g.events || []).filter(e => e.type === 'pa_end');
  let bases = { 1: null, 2: null, 3: null };
  let score = { home: 0, away: 0 };
  let outs = 0, runnerCounter = 0, prevKey = null;
  for (let i = 0; i <= targetPaIdx; i++) {
    const e = paEvents[i];
    const key = e.inning + '-' + e.half;
    if (prevKey !== null && key !== prevKey) { bases = { 1: null, 2: null, 3: null }; outs = 0; }
    prevKey = key;
    runnerCounter++;
    const player = State.getPlayer(e.batterId);
    const br = { id: 'rp_' + i, playerId: e.batterId, name: player ? player.name.split(' ')[0] : '?', number: runnerCounter };
    let runsCount = 0;
    if (e.outcome === 'BB') {
      const res = walkAdvance(bases, br); bases = res.newBases; runsCount = res.runnerIdsScored.length;
    } else if (e.outcome === 'K' || e.outcome === 'OUT') {
      outs++;
    } else if (['1B','2B','3B','HR'].includes(e.outcome)) {
      const res = advanceRunners(bases, ({ '1B':1,'2B':2,'3B':3,'HR':4 })[e.outcome], br);
      bases = res.newBases; runsCount = res.runnerIdsScored.length;
    } else if (e.outcome === 'ERR_REACH') {
      const res = advanceRunners(bases, ({ '1B':1,'2B':2,'3B':3,'HR':4 })[e.errBase] || 1, br);
      bases = res.newBases; runsCount = res.runnerIdsScored.length;
    }
    if (e.half === 'top') score.away += runsCount; else score.home += runsCount;
  }
  return { bases, score, outs };
}

function selectPlay(ts) {
  const g = State.getGame(LiveGameId);
  if (!g || g.status !== 'completed') return;
  const paEvents = (g.events || []).filter(e => e.type === 'pa_end');
  const targetIdx = paEvents.findIndex(e => e.ts === ts);
  if (targetIdx < 0) return;
  const event = paEvents[targetIdx];
  if (_selectedPlayTs === ts) { clearPlaySelection(g); return; }
  _selectedPlayTs = ts;

  let bases, score, outs;
  if (event.basesAfter) {
    bases = event.basesAfter; score = event.scoreAfter || g.score; outs = event.outsAfter ?? 0;
  } else {
    const r = replayToEvent(g, targetIdx); bases = r.bases; score = r.score; outs = r.outs;
  }

  $$('.play-entry').forEach(li => li.classList.toggle('selected', li.dataset.ts === String(ts)));
  drawField(bases);
  drawBases(bases);

  const sbAway = $('#sb-score-away'), sbHome = $('#sb-score-home');
  if (sbAway) sbAway.textContent = score.away;
  if (sbHome) sbHome.textContent = score.home;
  const sbInning = $('#sb-inning');
  if (sbInning) sbInning.textContent = (event.half === 'top' ? '▲ Top ' : '▼ Bot ') + event.inning;
  const sbOuts = $('#sb-outs');
  if (sbOuts) sbOuts.innerHTML = `Outs <span class="out-dots"><span class="out-dot${outs >= 1 ? ' on' : ''}"></span><span class="out-dot${outs >= 2 ? ' on' : ''}"></span><span class="out-dot${outs >= 3 ? ' on' : ''}"></span></span>`;

  const banner = $('#replay-banner');
  if (banner) {
    const batter = State.getPlayer(event.batterId);
    banner.style.display = 'flex';
    banner.innerHTML = `<span>▶ ${event.half === 'top' ? 'T' : 'B'}${event.inning} — ${escapeHtml(batter?.name || '?')} — ${describeOutcome(event)}</span><button class="btn btn-sm" onclick="clearPlaySelection()">Reset view</button>`;
  }
}

function clearPlaySelection(g) {
  if (!g) g = State.getGame(LiveGameId);
  _selectedPlayTs = null;
  $$('.play-entry').forEach(li => li.classList.remove('selected'));
  drawField(null);
  drawBases(null);
  const sbAway = $('#sb-score-away'), sbHome = $('#sb-score-home');
  if (sbAway && g) sbAway.textContent = g.score.away;
  if (sbHome && g) sbHome.textContent = g.score.home;
  const sbInning = $('#sb-inning');
  if (sbInning) sbInning.textContent = 'FINAL';
  const sbOuts = $('#sb-outs');
  if (sbOuts) sbOuts.innerHTML = `Outs <span class="out-dots"><span class="out-dot"></span><span class="out-dot"></span><span class="out-dot"></span></span>`;
  const banner = $('#replay-banner');
  if (banner) banner.style.display = 'none';
}

/* ============================================================
   FIELD DIAMOND (SVG)
   ============================================================ */
const FIELD = {
  HOME:    { x: 200, y: 390 },
  FIRST:   { x: 280, y: 310 },
  SECOND:  { x: 200, y: 230 },
  THIRD:   { x: 120, y: 310 },
  MOUND:   { x: 200, y: 305 },
  CF_HOME: { x: 200, y: 155 },
};

let __fieldClickMode = null;

function drawField(overrideBases = null) {
  const g = State.getGame(LiveGameId);
  if (!g) return;
  const container = $('#field-container');
  if (!container) return;

  const isCompleted = g.status === 'completed';

  const fieldingPos = fieldingPositions(g);
  const pitcherId = Object.keys(fieldingPos).find(pid => fieldingPos[pid] === 'P');
  const cfId = Object.keys(fieldingPos).find(pid => fieldingPos[pid] === 'CF');
  const pitcher = pitcherId ? State.getPlayer(pitcherId) : null;
  const cf = cfId ? State.getPlayer(cfId) : null;

  const fielderMarker = (pid, player, pos, cx, cy) => {
    if (!pid || !player) return '';
    return `<g class="fielder" data-pid="${pid}" data-pos="${pos}" transform="translate(${cx},${cy})" onclick="onFielderClick('${pid}', '${pos}')">
      <circle r="18" />
      <text class="pos">${pos}</text>
      <text class="name bg" y="36">${escapeHtml(player.name)}</text>
      <text class="name" y="36">${escapeHtml(player.name)}</text>
    </g>`;
  };

  const svg = `
    <svg viewBox="0 0 400 400" class="field-svg" id="field-svg">
      <path class="grass" d="M 200 390 L 59 145 A 283 283 0 0 1 341 145 Z"/>
      <path class="double-line" d="M 105 226 A 190 190 0 0 1 295 226" />
      ${isCompleted ? '' : fielderMarker(pitcherId, pitcher, 'P',  FIELD.MOUND.x,   FIELD.MOUND.y)}
      ${isCompleted ? '' : fielderMarker(cfId,      cf,      'CF', FIELD.CF_HOME.x, FIELD.CF_HOME.y)}
    </svg>
  `;
  container.innerHTML = svg;

  const svgEl = $('#field-svg');
  attachSvgLocationHandlers(svgEl);
}

function drawBases(overrideBases = null) {
  const g = State.getGame(LiveGameId);
  if (!g) return;
  const container = $('#bases-container');
  if (!container) return;

  const isCompleted = g.status === 'completed';
  const bases = overrideBases !== null ? overrideBases
              : isCompleted            ? { 1: null, 2: null, 3: null }
              : g.bases;

  const B = { HOME: {x:100,y:190}, FIRST: {x:162,y:110}, SECOND: {x:100,y:30}, THIRD: {x:38,y:110} };
  const s = 7;

  const sq = (cx, cy, occ) => {
    const cls = 'base' + (occ ? ' occupied' : '');
    return `<polygon class="${cls}" points="${cx},${cy-s} ${cx+s},${cy} ${cx},${cy+s} ${cx-s},${cy}" />`;
  };

  const tag = (runner, cx, cy, above) => {
    if (!runner) return '';
    const label = runner.name;
    const w = Math.max(46, label.length * 6);
    const ty = above ? cy - 28 : cy + 14;
    return `<g class="runner-tag" transform="translate(${cx - w/2}, ${ty})">
      <rect x="0" y="0" width="${w}" height="18" rx="4" />
      <text x="${w/2}" y="13">${escapeHtml(label)}</text>
    </g>`;
  };

  container.innerHTML = `
    <svg viewBox="0 0 200 215" class="bases-svg">
      <polygon class="diamond-outline" points="${B.HOME.x},${B.HOME.y} ${B.FIRST.x},${B.FIRST.y} ${B.SECOND.x},${B.SECOND.y} ${B.THIRD.x},${B.THIRD.y}" />
      ${sq(B.HOME.x,   B.HOME.y,   false)}
      ${sq(B.FIRST.x,  B.FIRST.y,  !!bases[1])}
      ${sq(B.SECOND.x, B.SECOND.y, !!bases[2])}
      ${sq(B.THIRD.x,  B.THIRD.y,  !!bases[3])}
      ${tag(bases[1], B.FIRST.x,  B.FIRST.y,  false)}
      ${tag(bases[2], B.SECOND.x, B.SECOND.y, true)}
      ${tag(bases[3], B.THIRD.x,  B.THIRD.y,  false)}
    </svg>
  `;
}

function svgPoint(svg, evt) {
  const pt = svg.createSVGPoint();
  const src = (evt.changedTouches || evt.touches)?.[0] || evt;
  pt.x = src.clientX;
  pt.y = src.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function attachSvgLocationHandlers(svgEl) {
  const handle = (e) => {
    if (!__fieldClickMode) return;
    if (e.target.closest('.fielder')) return;
    e.preventDefault();
    const pt = svgPoint(svgEl, e);
    __fieldClickMode.onClick({ x: Math.round(pt.x), y: Math.round(pt.y) });
  };
  svgEl.addEventListener('click', handle);
  svgEl.addEventListener('touchend', handle, { passive: false });
}

function onFielderClick(pid, pos) {
  if (__fieldClickMode && __fieldClickMode.onPickFielder) {
    __fieldClickMode.onPickFielder(pid);
    return;
  }
  showSwapFielderModal(pid, pos);
}

/* ----- Swap fielder positions ----- */
function showSwapFielderModal(currentPid, currentPos) {
  const g = State.getGame(LiveGameId); if (!g) return;
  const positions = fieldingPositions(g);
  const team = State.getTeam(fieldingTeamId(g));
  const others = team.playerIds.filter(pid => pid !== currentPid);
  const cur = State.getPlayer(currentPid);
  const list = others.map(pid => {
    const p = State.getPlayer(pid);
    const otherPos = positions[pid] || 'BENCH';
    return `<button class="btn" style="display:flex; justify-content:space-between; width:100%; margin-bottom:6px;" onclick="swapFielder('${currentPid}', '${pid}')">
      <span>${escapeHtml(p?.name || '?')}</span>
      <span class="pill">${otherPos}</span>
    </button>`;
  }).join('');
  Modal.show(`
    <div class="modal-header">
      <h3>Swap ${currentPos}: ${escapeHtml(cur?.name || '')}</h3>
      <button class="btn-icon" onclick="Modal.hide(); renderLiveGame('${g.id}')">✕</button>
    </div>
    <div class="modal-body">
      <p class="help-text" style="margin-bottom:10px">Pick a player to move into the ${currentPos} role. The current ${currentPos} will take their position.</p>
      ${list || '<div class="muted">No other players available.</div>'}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="Modal.hide(); renderLiveGame('${g.id}')">Cancel</button>
    </div>
  `);
}

async function swapFielder(currentPid, newPid) {
  const g = State.getGame(LiveGameId); if (!g) return;
  const positions = { ...(g.currentHalf === 'top' ? g.homePositions : g.awayPositions) };
  const oldPos = positions[currentPid];
  const newOldPos = positions[newPid];
  positions[currentPid] = newOldPos;
  positions[newPid] = oldPos;
  const patch = g.currentHalf === 'top' ? { homePositions: positions } : { awayPositions: positions };
  await State.updateGame(g.id, patch);
  renderLiveGame(g.id);
  toast(`${oldPos}: ${State.getPlayer(newPid).name}`, 'success');
}

/* ============================================================
   PITCH HANDLERS
   ============================================================ */
function attachPitchHandlers() {
  document.querySelectorAll('.pitch-buttons button').forEach(btn => {
    btn.addEventListener('click', () => handlePitch(btn.dataset.pitch));
  });
}

async function handlePitch(kind) {
  const g = State.getGame(LiveGameId); if (!g) return;
  if (g.status === 'completed') return;
  if (!canUserScore()) { toast('You need scoring privilege to record plays', 'error'); return; }
  _undoStack.push(captureSnapshot(g));
  _redoStack.length = 0;

  if (kind === 'ball') {
    g.balls++;
    if (g.balls >= 4) {
      await applyPaEnd(g, { outcome: 'BB' });
    } else {
      await State.updateGame(g.id, { balls: g.balls });
      renderLiveGame(g.id);
    }
    return;
  }
  if (kind === 'strike_swinging' || kind === 'strike_looking') {
    g.strikes++;
    if (g.strikes >= 3) {
      await applyPaEnd(g, { outcome: 'K', kType: kind === 'strike_swinging' ? 'swinging' : 'looking' });
    } else {
      await State.updateGame(g.id, { strikes: g.strikes });
      renderLiveGame(g.id);
    }
    return;
  }
  if (kind === 'foul') {
    g.fouls = (g.fouls || 0) + 1;
    if (g.fouls >= 4) {
      await applyPaEnd(g, { outcome: 'K', kType: 'foul_out' });
    } else {
      if (g.strikes < 2) g.strikes++;
      await State.updateGame(g.id, { strikes: g.strikes, fouls: g.fouls });
      renderLiveGame(g.id);
    }
    return;
  }
  if (kind === 'bip') {
    showBipChoiceModal();
    return;
  }
}
