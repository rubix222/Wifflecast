let __pendingPlay = null;

function askLocation(kind, detail) {
  __pendingPlay = { kind, detail, fielderId: null, location: null };
  const g = State.getGame(LiveGameId);
  const needFielder = kind === 'out' || kind === 'error';

  let fielderSection = '';
  if (needFielder) {
    const fieldingPos = fieldingPositions(g);
    const team = State.getTeam(fieldingTeamId(g));
    const fielderButtons = team.playerIds.map(pid => {
      const p = State.getPlayer(pid);
      const pos = fieldingPos[pid] || 'BENCH';
      return `<button class="btn" data-fielder="${pid}" style="margin:3px">${escapeHtml(p.name)} <span class="pill" style="margin-left:4px">${pos}</span></button>`;
    }).join('');
    fielderSection = `<div id="loc-fielders" class="row-flex" style="margin-bottom:10px">${fielderButtons}</div>`;
  }

  const titleByKind = {
    out:   `Out — ${hitTypeLabel(detail)}`,
    hit:   ({ '1B': 'Single', '2B': 'Double', '3B': 'Triple' })[detail] || 'Hit',
    hr:    'Home Run — mark where it left the field',
    error: `Error — batter reached ${detail}`
  };
  const purpose = kind === 'hr'
    ? 'Touch or click the boundary where the ball left the field.'
    : kind === 'hit'
      ? 'Touch or drag to where the ball went.'
      : kind === 'error'
        ? '1) Pick the fielder who committed the error. 2) Tap the spot on the field.'
        : '1) Pick the fielder who made the play. 2) Tap the spot on the field.';
  const initStatus = needFielder ? 'Pick a fielder, then tap the field.' : 'Tap the field to mark the location.';

  Modal.show(`
    <div class="modal-header">
      <h3>${titleByKind[kind] || ''}</h3>
      <button class="btn-icon" onclick="cancelLocation()">✕</button>
    </div>
    <div class="modal-body">
      <p class="help-text" style="margin-bottom:10px">${purpose}</p>
      ${fielderSection}
      <div id="loc-field-wrap"></div>
      <div class="help-text center" id="loc-status" style="margin-top:8px">${initStatus}</div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cancelLocation()">Cancel</button>
      <button id="loc-confirm" class="btn btn-primary" disabled onclick="confirmLocation()">Confirm</button>
    </div>
  `, { wide: true });

  const container = $('#loc-field-wrap');
  container.innerHTML = `<div id="field-container"></div>`;
  drawField();
  const svgEl = $('#field-svg');
  if (svgEl) svgEl.classList.add('location-mode');

  __fieldClickMode = {
    onClick(loc) {
      __pendingPlay.location = loc;
      drawBallMarker(loc);
      updateLocConfirm();
    },
    onPickFielder(pid) {
      __pendingPlay.fielderId = pid;
      $$('#loc-fielders button').forEach(b => {
        b.classList.toggle('btn-primary', b.dataset.fielder === pid);
      });
      updateLocConfirm();
    }
  };

  if (needFielder) {
    $$('#loc-fielders button[data-fielder]').forEach(btn => {
      btn.addEventListener('click', () => __fieldClickMode.onPickFielder(btn.dataset.fielder));
    });
  }
}

function drawBallMarker(loc) {
  const svg = $('#field-svg'); if (!svg) return;
  let m = svg.querySelector('.ball-marker');
  if (!m) {
    m = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    m.setAttribute('class', 'ball-marker');
    m.setAttribute('r', 6);
    svg.appendChild(m);
  }
  m.setAttribute('cx', loc.x);
  m.setAttribute('cy', loc.y);
}

function updateLocConfirm() {
  if (!__pendingPlay) return;
  const needFielder = __pendingPlay.kind === 'out' || __pendingPlay.kind === 'error';
  const ok = __pendingPlay.location && (!needFielder || __pendingPlay.fielderId);
  $('#loc-confirm').disabled = !ok;
  const statusEl = $('#loc-status'); if (!statusEl) return;
  if (ok) {
    const f = __pendingPlay.fielderId ? State.getPlayer(__pendingPlay.fielderId) : null;
    statusEl.textContent = (f ? `Fielder: ${f.name} · ` : '') + 'Location set. Tap Confirm.';
  } else if (needFielder && __pendingPlay.fielderId) {
    statusEl.textContent = 'Now tap the field where the ball ended up.';
  } else if (needFielder && __pendingPlay.location) {
    statusEl.textContent = 'Now pick the fielder.';
  } else if (!needFielder) {
    statusEl.textContent = __pendingPlay.location ? 'Location set. Tap Confirm.' : 'Tap the field to mark the location.';
  }
}

function cancelLocation() {
  __pendingPlay = null;
  __fieldClickMode = null;
  Modal.hide();
  renderLiveGame(LiveGameId);
}

async function confirmLocation() {
  if (!__pendingPlay || !__pendingPlay.location) return;
  const needFielder = __pendingPlay.kind === 'out' || __pendingPlay.kind === 'error';
  if (needFielder && !__pendingPlay.fielderId) return;
  const gSnap = State.getGame(LiveGameId);
  if (gSnap) { _undoStack.push(captureSnapshot(gSnap)); _redoStack.length = 0; }
  const { kind, detail, fielderId, location } = __pendingPlay;
  __pendingPlay = null;
  __fieldClickMode = null;
  if (kind === 'out')   await finishOut(detail, fielderId, location);
  if (kind === 'hit')   await finishHit(detail, fielderId, location);
  if (kind === 'hr')    await finishHit('HR', null, location);
  if (kind === 'error') await finishError(detail, fielderId, location);
}

/* ============================================================
   PA RESOLUTION
   ============================================================ */
async function finishOut(hitType, fielderId, location) {
  const g = State.getGame(LiveGameId);
  await applyPaEnd(g, { outcome: 'OUT', hitType, fielderId, location });
}

async function finishHit(hitDetail, fielderId, location) {
  const g = State.getGame(LiveGameId);
  await applyPaEnd(g, { outcome: hitDetail, fielderId, location });
}

async function finishError(errBase, errorById, location) {
  const g = State.getGame(LiveGameId);
  await applyPaEnd(g, { outcome: 'ERR_REACH', errBase, errorById, location });
}

async function applyPaEnd(g, ev) {
  const batterId = currentBatterId(g);
  const pitcherId = currentPitcherId(g);
  const inning = g.currentInning;
  const half = g.currentHalf;

  const event = {
    type: 'pa_end',
    ts: Date.now(),
    inning, half,
    batterId,
    pitcherId,
    scoredBy: currentUser?.uid || null,
    scoredByName: currentUserProfile?.name || currentUser?.email?.split('@')[0] || null,
    outcome: ev.outcome,
    kType: ev.kType || null,
    hitType: ev.hitType || null,
    errBase: ev.errBase || null,
    errorById: ev.errorById || null,
    fielderId: ev.fielderId || null,
    location: ev.location || null,
    rbi: 0,
    earnedRuns: 0,
    runsScoredBy: [],
  };

  const newBases = { 1: g.bases[1], 2: g.bases[2], 3: g.bases[3] };
  let runs = [];
  let outsToAdd = 0;

  if (ev.outcome === 'BB') {
    const r = makeRunner(g, batterId);
    const res = walkAdvance(newBases, r);
    Object.assign(newBases, res.newBases);
    runs = res.runnerIdsScored;
  } else if (ev.outcome === 'K' || ev.outcome === 'OUT') {
    outsToAdd = 1;
  } else if (['1B','2B','3B','HR'].includes(ev.outcome)) {
    const target = ({ '1B': 1, '2B': 2, '3B': 3, 'HR': 4 })[ev.outcome];
    const r = makeRunner(g, batterId);
    const res = advanceRunners(newBases, target, r);
    Object.assign(newBases, res.newBases);
    runs = res.runnerIdsScored;
  } else if (ev.outcome === 'ERR_REACH') {
    const target = ({ '1B': 1, '2B': 2, '3B': 3, 'HR': 4 })[ev.errBase] || 1;
    const r = makeRunner(g, batterId);
    const res = advanceRunners(newBases, target, r);
    Object.assign(newBases, res.newBases);
    runs = res.runnerIdsScored;
  }

  // Map runner ids back to player ids for R stat
  const allRunners = [
    g.bases[1], g.bases[2], g.bases[3],
    newBases[1], newBases[2], newBases[3],
  ].filter(Boolean);
  const findRunner = (rid) => allRunners.find(r => r.id === rid);
  event.runsScoredBy = runs.map(rid => {
    const r = findRunner(rid); return r ? r.playerId : null;
  }).filter(Boolean);

  const runsCount = runs.length;
  if (ev.outcome !== 'ERR_REACH') { event.rbi = runsCount; event.earnedRuns = runsCount; }

  const newScore = { ...g.score };
  if (half === 'top') newScore.away += runsCount;
  else                newScore.home += runsCount;

  const lineScore = ensureLineScore(g);
  const inningEntry = lineScore.find(x => x.inning === inning);
  if (inningEntry) {
    if (half === 'top') inningEntry.top += runsCount;
    else                inningEntry.bottom += runsCount;
  }

  const newOuts = g.outs + outsToAdd;
  event.basesAfter = { 1: newBases[1], 2: newBases[2], 3: newBases[3] };
  event.scoreAfter = { ...newScore };
  event.outsAfter  = newOuts;
  const newEvents = [...(g.events || []), event];
  const idxKey = battingIdxKey(g);
  const newBatterIdx = g[idxKey] + 1;

  const patch = {
    bases: newBases,
    outs: newOuts,
    balls: 0,
    strikes: 0,
    fouls: 0,
    score: newScore,
    lineScore,
    events: newEvents,
    [idxKey]: newBatterIdx,
    runnerCounter: g.runnerCounter || 0,
  };

  await State.updateGame(g.id, patch);
  const fresh = State.getGame(g.id);
  await postPlayCheck(fresh);
  Modal.hide();
  renderLiveGame(g.id);
}

function ensureLineScore(g) {
  const ls = [...(g.lineScore || [])];
  while (ls.length < g.currentInning) {
    ls.push({ inning: ls.length + 1, top: 0, bottom: 0 });
  }
  return ls;
}

async function postPlayCheck(g) {
  if (g.outs >= 3) {
    await endHalfInningInternal(g);
    return;
  }
  // Walk-off: home batting in final inning or extras and they've taken the lead
  if (g.currentHalf === 'bottom' && g.currentInning >= g.numInnings && g.score.home > g.score.away) {
    await finishGame(g, 'walkoff');
  }
}

async function endHalfInningInternal(g) {
  let { currentInning, currentHalf } = g;
  if (currentHalf === 'top') {
    currentHalf = 'bottom';
    // Home already leads after top of last inning — no need to bat
    if (currentInning >= g.numInnings && g.score.home > g.score.away) {
      await finishGame(g, 'home_leads_after_top');
      return;
    }
  } else {
    currentInning++;
    currentHalf = 'top';
    if (currentInning > g.numInnings && g.score.home !== g.score.away) {
      await finishGame(g, 'regulation');
      return;
    }
    // If tied, continue into extras
  }
  await State.updateGame(g.id, {
    currentInning, currentHalf,
    outs: 0, balls: 0, strikes: 0, fouls: 0,
    bases: { 1: null, 2: null, 3: null },
  });
  const fresh = State.getGame(g.id);
  await State.updateGame(g.id, { lineScore: ensureLineScore(fresh) });
}

async function finishGame(g, _reason) {
  await State.updateGame(g.id, { status: 'completed', isOver: true });
  Render.games();
}

async function endHalfInning(gameId) {
  if (!confirm('End this half-inning early? The current at-bat will be discarded.')) return;
  const g = State.getGame(gameId); if (!g) return;
  await endHalfInningInternal(g);
  renderLiveGame(gameId);
}

async function endGameEarly(gameId) {
  if (!confirm('End the game now? Final scores will be locked.')) return;
  const g = State.getGame(gameId); if (!g) return;
  await State.updateGame(gameId, { status: 'completed', isOver: true });
  renderLiveGame(gameId);
  Render.games();
}

/* ============================================================
   END-OF-GAME ACCOLADES
   ============================================================ */
function computeGameAccolades(g) {
  const allPids = [...new Set([...(g.homeBattingOrder||[]), ...(g.awayBattingOrder||[])])];
  const ps = {};
  allPids.forEach(id => { ps[id] = { hits:0, rbi:0, hr:0, r:0, bb:0, kp:0, xbh:0, err:0 }; });
  (g.events||[]).forEach(e => {
    if (e.type !== 'pa_end') return;
    const b = ps[e.batterId], pit = ps[e.pitcherId];
    if (b) {
      if (e.outcome==='BB') b.bb++;
      if (['1B','2B','3B','HR'].includes(e.outcome)) { b.hits++; if (e.outcome!=='1B') b.xbh++; }
      if (e.outcome==='HR') b.hr++;
      b.rbi += e.rbi||0;
    }
    if (pit) { if (e.outcome==='K') pit.kp++; }
    if (e.errorById && ps[e.errorById]) ps[e.errorById].err++;
    (e.runsScoredBy||[]).forEach(pid => { if (ps[pid]) ps[pid].r++; });
  });
  const mx = fn => Math.max(0, ...allPids.map(id => fn(ps[id])));
  const mHit=mx(s=>s.hits), mRbi=mx(s=>s.rbi), mHr=mx(s=>s.hr),
        mR=mx(s=>s.r), mKp=mx(s=>s.kp), mBb=mx(s=>s.bb),
        mXbh=mx(s=>s.xbh), mErr=mx(s=>s.err);
  return allPids.map(pid => {
    const player = State.getPlayer(pid); if (!player) return null;
    const s = ps[pid];
    const c = [];
    if (s.hr>0  && s.hr===mHr)   c.push({ label:'Home Run Hero',   emoji:'🚀', detail:`${s.hr} HR` });
    if (s.rbi>0 && s.rbi===mRbi) c.push({ label:'RBI Machine',     emoji:'💥', detail:`${s.rbi} RBI` });
    if (s.hits>0&& s.hits===mHit) c.push({ label:'Hit Machine',    emoji:'⚾', detail:`${s.hits} H` });
    if (s.kp>0  && s.kp===mKp)   c.push({ label:'Strikeout King',  emoji:'🔥', detail:`${s.kp} K` });
    if (s.r>0   && s.r===mR)     c.push({ label:'Run Scorer',      emoji:'🏃', detail:`${s.r} R` });
    if (s.bb>0  && s.bb===mBb)   c.push({ label:'On-Base Machine', emoji:'🎯', detail:`${s.bb} BB` });
    if (s.xbh>0 && s.xbh===mXbh) c.push({ label:'Extra Bases',    emoji:'💪', detail:`${s.xbh} XBH` });
    if (s.err>0 && s.err===mErr) c.push({ label:'Tough Day',       emoji:'😬', detail:`${s.err} E` });
    const accolade = c[0] || (s.hits>0
      ? { label:'Solid Contact', emoji:'⭐', detail:`${s.hits} H` }
      : { label:'Game Played',   emoji:'🤝', detail:'' });
    return { player, ...accolade };
  }).filter(Boolean);
}

function renderAccolades(g) {
  const list = computeGameAccolades(g);
  if (!list.length) return '';
  const cards = list.map(a => `
    <div class="accolade-card">
      <div class="accolade-emoji">${a.emoji}</div>
      <div class="accolade-label">${a.label}</div>
      <div class="accolade-name">${escapeHtml(a.player.name)}</div>
      ${a.detail ? `<div class="accolade-detail">${a.detail}</div>` : ''}
    </div>`).join('');
  return `<div class="accolades-section"><h3>Game Awards</h3><div class="accolades-row">${cards}</div></div>`;
}

/* ============================================================
   LINE SCORE
   ============================================================ */
function renderLineScore(g, away, home) {
  const innings = Math.max(g.numInnings, g.lineScore?.length || 0, g.currentInning);
  const ls = g.lineScore || [];
  const headerCells = [];
  for (let i = 1; i <= innings; i++) headerCells.push(`<th>${i}</th>`);
  const awayCells = [], homeCells = [];
  for (let i = 1; i <= innings; i++) {
    const entry = ls.find(x => x.inning === i);
    const topVal  = entry ? entry.top    : '';
    // Don't show bottom if not yet played
    const botVal  = (!entry || (i === g.currentInning && g.currentHalf === 'top' && g.status !== 'completed'))
      ? '' : entry.bottom;
    awayCells.push(`<td>${topVal === '' ? '-' : topVal}</td>`);
    homeCells.push(`<td>${botVal === '' ? '-' : botVal}</td>`);
  }
  return `<table>
    <thead><tr><th></th>${headerCells.join('')}<th>R</th></tr></thead>
    <tbody>
      <tr><td class="team">${escapeHtml(away.name)}</td>${awayCells.join('')}<td class="total">${g.score.away}</td></tr>
      <tr><td class="team">${escapeHtml(home.name)}</td>${homeCells.join('')}<td class="total">${g.score.home}</td></tr>
    </tbody>
  </table>`;
}

async function migrateGames() {
  const saves = [];
  State.games.forEach(g => {
    let changed = false;
    if (g.numInnings   === undefined) { g.numInnings   = 7;                            changed = true; }
    if (g.score        === undefined) { g.score        = { home: 0, away: 0 };         changed = true; }
    if (g.lineScore    === undefined) { g.lineScore    = [];                            changed = true; }
    if (g.outs         === undefined) { g.outs         = 0;                             changed = true; }
    if (g.balls        === undefined) { g.balls        = 0;                             changed = true; }
    if (g.strikes      === undefined) { g.strikes      = 0;                             changed = true; }
    if (g.fouls        === undefined) { g.fouls        = 0;                             changed = true; }
    if (g.bases        === undefined) { g.bases        = { 1: null, 2: null, 3: null }; changed = true; }
    if (g.runnerCounter=== undefined) { g.runnerCounter= 0;                             changed = true; }
    if (g.homeBatterIdx=== undefined) { g.homeBatterIdx= 0;                             changed = true; }
    if (g.awayBatterIdx=== undefined) { g.awayBatterIdx= 0;                             changed = true; }
    if (g.currentInning=== undefined) { g.currentInning= 1;                             changed = true; }
    if (g.currentHalf  === undefined) { g.currentHalf  = 'top';                         changed = true; }
    if (g.events       === undefined) { g.events       = [];                             changed = true; }
    if (changed) saves.push(Storage.saveGame(g));
  });
  if (saves.length) await Promise.all(saves);
}

let _bootDone = false;
async function boot() {
  await Storage.init();

  // Handle email link sign-in before anything else
  const fs = window._fs;
  if (fs.isSignInWithEmailLink(fs.auth, window.location.href)) {
    await handleEmailLinkSignIn();
  }

  // Auth state fires immediately (null if signed out).
  // Load all data here so it works whether Firestore rules require auth or not.
  fs.onAuthStateChanged(fs.auth, async (user) => {
    currentUser = user;
    currentUserProfile = null;

    try {
      await Storage.loadAll();
    } catch (err) {
      // Rules may require auth — show a sign-in prompt instead of blank screen
      console.warn('Firestore loadAll error:', err.code, err.message);
      if (!user) {
        const c = $('#players-container');
        if (c) c.innerHTML = `<div class="empty-state">
          <h3>Sign in to view data</h3>
          <p>Your data is stored in the cloud. Sign in to access it.</p>
          <button class="btn btn-primary" onclick="showAuthModal('signin')">Sign In</button>
        </div>`;
      }
    }

    if (user) {
      currentUserProfile = await Storage.getUser(user.uid).catch(() => null);
    }

    updateAuthUI();

    // Always re-subscribe listeners (unsubAll cancels the old ones first)
    Storage.listenAll();

    // Migration only needs to run once on first successful data load
    if (!_bootDone && State.games.length) {
      _bootDone = true;
      await migrateGames();
    } else {
      _bootDone = true;
    }

    Render.all();
  });
}

document.addEventListener('firebase-ready', boot, { once: true });
